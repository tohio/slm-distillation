artifact:
  run_name: slm-125m-deepseek-distilled
  backend: s3
  s3_uri: s3://YOUR_BUCKET/slm-distillation/slm-125m-deepseek-distilled/
  local_dir: artifacts/slm-125m-deepseek-distilled
  bundle_path: artifacts/slm-125m-deepseek-distilled.tar.gz
  delete_remote_extra: true
  required:
    - data/distill/response_distill.jsonl
    - data/preference/dpo_pairs.jsonl
  include:
    - data/raw_teacher/*.jsonl
    - data/validated/*.jsonl
    - data/rejected/*.jsonl
    - data/distill/*.jsonl
    - data/preference/*.jsonl
