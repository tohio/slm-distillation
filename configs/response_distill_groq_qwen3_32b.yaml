teacher:
  name: groq_qwen3_32b

student:
  name: slm-student
  checkpoint_path: ../slm/results/runs/student/final
  tokenizer_path: ../slm/results/runs/student/tokenizer

distillation:
  mode: response
  target_tokens: 50000000
  max_output_tokens: 1024
  temperature: 0.2
  top_p: 0.9
  max_retries: 2
  retry_delay_seconds: 2.0
  continue_on_error: true

data:
  prompts_paths:
  - data/prompts/built_prompts.jsonl
  raw_teacher_path: data/raw_teacher/groq_qwen3_32b.jsonl
  validated_path: data/validated/groq_qwen3_32b.jsonl
  rejected_path: data/rejected/groq_qwen3_32b.jsonl
  distill_dataset_path: data/distill/groq_qwen3_32b_response_distill.jsonl

validation:
  require_non_empty_output: true
  reject_refusals_when_not_expected: true
  reject_code_fences_for_function_body_tasks: true
  max_retries: 2

providers:
  groq:
    generation:
      batch_size: 16
      min_batch_size: 1
      parallel_requests: 8
      progress_interval: 25
      concurrency: 2
      max_requeues: 3
      exhausted_retryable_requeue_delay_seconds: 30.0
      max_request_retries: 3
      max_retryable_request_attempts: 20
      retry_max_elapsed_seconds: 1800.0
      retry_sleep_seconds: 0.5
      retry_backoff_initial_seconds: 1.0
      retry_backoff_max_seconds: 20.0
      retry_backoff_multiplier: 2.0
      retry_jitter_ratio: 0.30
      adaptive_concurrency_enabled: true
      adaptive_initial_in_flight: 1
      adaptive_minimum_in_flight: 1
      adaptive_rate_limit_decrease_factor: 0.50
      adaptive_cooldown_initial_seconds: 5.0
      adaptive_cooldown_max_seconds: 60.0
      adaptive_cooldown_multiplier: 2.0

      request_timeout_seconds: 300
      json_mode: false
      adaptive_slow_start_enabled: true
      adaptive_slow_start_multiplier: 2.0
      adaptive_increase_successes_per_step: 64
      adaptive_increase_step: 16
      adaptive_rate_limit_burst_threshold: 4
      adaptive_rate_limit_window_seconds: 2.0
      adaptive_sustained_rate_limit_attempt_window: 60
      adaptive_sustained_rate_limit_threshold: 20
output:
  model_name: slm-125m-groq-qwen3-32b-distilled
  source_model_name: slm-125m
  teacher_family: groq
  run_dir: runs/slm-125m-groq-qwen3-32b-distilled
  checkpoint_dir: runs/slm-125m-groq-qwen3-32b-distilled/response_distill/checkpoints
  final_checkpoint_dir: runs/slm-125m-groq-qwen3-32b-distilled/dpo/checkpoints/final
  export_repo: tohio/slm-125m-groq-qwen3-32b-distilled

model_card:
  source_checkpoint: tohio/slm-125m-instruct
  teacher_model: qwen/qwen3-32b
  teacher_provider: groq
  distillation_type: response
  dpo_applied: true
