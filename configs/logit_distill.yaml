teacher:
  provider: local
  model_name: slm-teacher
  checkpoint_path: ../slm/results/runs/teacher/final
  tokenizer_path: ../slm/results/runs/teacher/tokenizer

student:
  model_name: slm-125m
  checkpoint_path: ../slm/results/runs/125m/sft_chat/final
  tokenizer_path: ../slm/results/runs/125m/tokenizer

distillation:
  mode: logit
  temperature: 2.0
  alpha: 0.5
  max_length: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000005
  num_train_epochs: 1
  bf16: true
  seed: 42

compatibility:
  require_same_tokenizer: true

hardware:
  single_gpu_required: true
  allowed_gpu_classes:
    - b300
    - b200
    - h200
    - a100

output:
  run_dir: runs/logit_distill
  checkpoint_dir: runs/logit_distill/checkpoints
