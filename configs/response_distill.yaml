teacher:
  name: deepseek_v4_flash

student:
  name: slm-student
  checkpoint_path: ../slm/results/runs/student/final
  tokenizer_path: ../slm/results/runs/student/tokenizer

distillation:
  mode: response
  target_tokens: 50000000
  max_output_tokens: 1024
  temperature: 0.2
  top_p: 0.9
  max_retries: 2
  retry_delay_seconds: 2.0
  continue_on_error: true

data:
  prompts_path: data/prompts/instruction_seed.jsonl
  prompts_paths:
    - data/prompts/instruction_seed.jsonl
  raw_teacher_path: data/raw_teacher/deepseek_v4_flash.jsonl
  validated_path: data/validated/deepseek_v4_flash.jsonl
  rejected_path: data/rejected/deepseek_v4_flash.jsonl
  distill_dataset_path: data/distill/response_distill.jsonl

validation:
  require_non_empty_output: true
  reject_refusals_when_not_expected: true
  reject_code_fences_for_function_body_tasks: true
  max_retries: 2

output:
  model_name: slm-125m-deepseek-distilled
  source_model_name: slm-125m
  teacher_family: deepseek
  run_dir: runs/slm-125m-deepseek-distilled
  checkpoint_dir: runs/slm-125m-deepseek-distilled/response_distill/checkpoints
  final_checkpoint_dir: runs/slm-125m-deepseek-distilled/dpo/checkpoints/final
  export_repo: tohio/slm-125m-deepseek-distilled

model_card:
  source_checkpoint: tohio/slm-125m-instruct
  teacher_model: deepseek/deepseek-v4-flash
  teacher_provider: openrouter
  distillation_type: response
  dpo_applied: true
